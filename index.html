<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Natalko 💌 Pójdziemy na randkę?</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --pink: #f9a8c9;
        --pink-dark: #e87aa8;
        --lavender: #c5b8f0;
        --cream: #fff5f8;
        --card: #ffffff;
        --text: #5a2d3a;
        --petal: #f9a8c9;
      }

      body {
        min-height: 100vh;
        background: var(--cream);
        font-family: "Nunito", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }

      /* ── Floating petals background ── */
      .petals-bg {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }
      .petal {
        position: absolute;
        font-size: 1.1rem;
        opacity: 0.55;
        animation: fall linear infinite;
      }

      @keyframes fall {
        0% {
          transform: translateY(-60px) rotate(0deg);
          opacity: 0;
        }
        10% {
          opacity: 0.55;
        }
        90% {
          opacity: 0.55;
        }
        100% {
          transform: translateY(110vh) rotate(360deg);
          opacity: 0;
        }
      }

      /* ── Card ── */
      .card {
        position: relative;
        z-index: 1;
        background: var(--card);
        border-radius: 32px;
        padding: 48px 52px 44px;
        width: min(520px, 92vw);
        text-align: center;
        box-shadow:
          0 8px 40px rgba(249, 168, 201, 0.35),
          0 2px 8px rgba(249, 168, 201, 0.2);
        animation: popIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }

      @keyframes popIn {
        from {
          transform: scale(0.7) translateY(30px);
          opacity: 0;
        }
        to {
          transform: scale(1) translateY(0);
          opacity: 1;
        }
      }

      /* decorative corner flowers */
      .card::before,
      .card::after {
        content: "🌸";
        position: absolute;
        font-size: 1.4rem;
        opacity: 0.4;
      }
      .card::before {
        top: 18px;
        left: 22px;
      }
      .card::after {
        bottom: 18px;
        right: 22px;
      }

      /* ── Cat photo ── */
      .avatar-wrap {
        width: 130px;
        height: 130px;
        margin: 0 auto 28px;
        border-radius: 28px;
        overflow: hidden;
        border: 4px solid var(--pink);
        box-shadow: 0 4px 18px rgba(249, 168, 201, 0.5);
        animation: float 3.5s ease-in-out infinite;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }

      .avatar-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* placeholder shown when no real image */
      .avatar-placeholder {
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #fce4ec, #f8bbd0);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 4rem;
      }

      /* ── Heading ── */
      h1 {
        font-family: "Pacifico", cursive;
        font-size: clamp(1.45rem, 5vw, 2rem);
        color: var(--text);
        line-height: 1.35;
        margin-bottom: 36px;
      }
      h1 .flower {
        display: inline-block;
        animation: spin 4s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ── Buttons ── */
      .btn-row {
        display: flex;
        gap: 18px;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
      }

      .btn {
        padding: 14px 36px;
        border: none;
        border-radius: 50px;
        font-family: "Nunito", sans-serif;
        font-size: 1.1rem;
        font-weight: 800;
        cursor: pointer;
        transition:
          transform 0.15s ease,
          box-shadow 0.15s ease;
      }

      .btn-yes {
        background: var(--pink);
        color: #fff;
        box-shadow: 0 4px 16px rgba(249, 168, 201, 0.55);
      }
      .btn-yes:hover {
        transform: scale(1.08);
        box-shadow: 0 6px 24px rgba(249, 168, 201, 0.7);
      }

      .btn-no {
        background: var(--lavender);
        color: #fff;
        box-shadow: 0 4px 16px rgba(197, 184, 240, 0.45);
        position: relative; /* for escape logic */
      }
      .btn-no:hover {
        transform: scale(0.93);
      }

      /* ── YES screen ── */
      #yes-screen {
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
      #yes-screen .big-emoji {
        font-size: 4rem;
      }
      #yes-screen h2 {
        font-family: "Pacifico", cursive;
        font-size: 1.8rem;
        color: var(--text);
      }
      #yes-screen p {
        color: #b06080;
        font-size: 1rem;
        font-weight: 600;
      }

      /* hearts burst */
      .hearts-burst {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 999;
      }
      .heart-particle {
        position: absolute;
        font-size: 1.8rem;
        animation: burst 1.2s ease-out forwards;
      }
      @keyframes burst {
        0% {
          transform: translate(0, 0) scale(0);
          opacity: 1;
        }
        100% {
          transform: translate(var(--dx), var(--dy)) scale(1.2);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <!-- falling petals -->
    <div class="petals-bg" id="petals"></div>

    <div class="card" id="main-card">
      <!-- initial content -->
      <div id="ask-screen">
        <div class="avatar-wrap">
          <!-- Swap the src below for your own cat/photo URL -->
          <div class="avatar-placeholder">🐱</div>
        </div>

        <h1>
          <span class="flower">🌸</span>
          Will you go on a&nbsp;date with me?
          <span class="flower" style="animation-direction: reverse">🌸</span>
        </h1>

        <div class="btn-row">
          <button class="btn btn-yes" onclick="sayYes()">YES ✔</button>
          <button
            class="btn btn-no"
            id="noBtn"
            onmouseenter="escapeNo(event)"
            onclick="escapeNo(event)"
          >
            no... 🐻
          </button>
        </div>
      </div>

      <!-- YES screen -->
      <div id="yes-screen">
        <div class="big-emoji">🥰</div>
        <h2>Yayyy!!! 💕</h2>
        <p>I knew you'd say yes~ 🌸</p>
        <p style="margin-top: 6px; font-size: 0.9rem; color: #c994b0">
          Can't wait for our date! 🍓
        </p>
      </div>
    </div>

    <!-- hearts container (injected on YES) -->
    <div class="hearts-burst" id="heartsBurst"></div>

    <script>
      /* ── Falling petals ── */
      const petalsContainer = document.getElementById("petals");
      const PETAL_COUNT = 28;
      const petalEmojis = ["🌸", "🌸", "🌸", "💮", "🏵️", "🌺"];

      for (let i = 0; i < PETAL_COUNT; i++) {
        const p = document.createElement("span");
        p.className = "petal";
        p.textContent =
          petalEmojis[Math.floor(Math.random() * petalEmojis.length)];
        const left = Math.random() * 100;
        const delay = Math.random() * 12;
        const dur = 7 + Math.random() * 8;
        const size = 0.7 + Math.random() * 0.8;
        p.style.cssText = `left:${left}%;top:-60px;animation-duration:${dur}s;animation-delay:${-delay}s;font-size:${size}rem;`;
        petalsContainer.appendChild(p);
      }

      /* ── No button escape ── */
      let noPresses = 0;
      let escaped = false;

      const noBtn = document.getElementById("noBtn");
      const card = document.getElementById("main-card");

      let btnX = null;
      let btnY = null;

      function initBtn() {
        if (btnX !== null) return;

        const btnRect = noBtn.getBoundingClientRect();
        const cardRect = card.getBoundingClientRect();

        // pozycja RELATYWNA do card
        btnX = btnRect.left - cardRect.left;
        btnY = btnRect.top - cardRect.top;

        noBtn.style.position = "absolute";
        noBtn.style.left = btnX + "px";
        noBtn.style.top = btnY + "px";
        noBtn.style.zIndex = "50";
      }

      function moveButton() {
        const cardRect = card.getBoundingClientRect();

        const maxX = cardRect.width - noBtn.offsetWidth - 20;
        const maxY = cardRect.height - noBtn.offsetHeight - 20;

        // losowa pozycja w granicach karty
        btnX = Math.random() * maxX;
        btnY = Math.random() * maxY;

        noBtn.style.left = btnX + "px";
        noBtn.style.top = btnY + "px";
      }

      function escapeNo() {
        if (noPresses > 8) return;

        noPresses++;

        if (!escaped) {
          initBtn();
          escaped = true;
        }

        moveButton();

        if (noPresses > 8) {
          noBtn.textContent = "fine... YES 💖";
          noBtn.style.background = "var(--pink)";

          setTimeout(sayYes, 600);
        }
      }

      /* ── Say YES ── */
      function sayYes() {
        document.getElementById("ask-screen").style.display = "none";

        const ys = document.getElementById("yes-screen");
        ys.style.display = "flex";

        spawnHearts();
      }

      function spawnHearts() {
        const container = document.getElementById("heartsBurst");
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        const emojis = ["💕", "💖", "💗", "💓", "💝", "🌸", "✨"];

        for (let i = 0; i < 30; i++) {
          const h = document.createElement("span");
          h.className = "heart-particle";
          h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
          const angle = Math.random() * 2 * Math.PI;
          const dist = 80 + Math.random() * 220;
          h.style.left = cx + "px";
          h.style.top = cy + "px";
          h.style.setProperty("--dx", Math.cos(angle) * dist + "px");
          h.style.setProperty("--dy", Math.sin(angle) * dist + "px");
          h.style.animationDelay = Math.random() * 0.4 + "s";
          container.appendChild(h);
          h.addEventListener("animationend", () => h.remove());
        }
      }
    </script>
  </body>
</html>
